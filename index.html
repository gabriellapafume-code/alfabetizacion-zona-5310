};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
window.dbGet = async (key) => {
  try { const snap = await getDoc(doc(db,"alfa",key)); return snap.exists()?snap.data().value:null; }
  catch(e){ return null; }
};
window.dbSet = async (key,value) => {
  try { await setDoc(doc(db,"alfa",key),{value}); } catch(e){}
};
window.firebaseReady = true;
document.dispatchEvent(new Event("firebaseReady"));

function setState(p){Object.assign(STATE,typeof p==="function"?p(STATE):p);render();}
async function dbGet(k){return window.dbGet?window.dbGet(k):null;}

// ── HELPERS ──────────────────────────────────────────
function semColorPct(pct,tipo){
  if(tipo==="c")return pct>=60?"#16a34a":pct>=30?"#d97706":"#dc2626";
  if(tipo==="p")return"#d97706";
  return"#dc2626";
}
function barraH(c=0,p=0,i=0){
  const t=c+p+i||1;
  const pc=Math.round(c/t*100),pp=Math.round(p/t*100),pi=Math.round(i/t*100);
  return`<div style="display:flex;align-items:center;gap:8px">
    <div style="flex:1;height:12px;border-radius:6px;overflow:hidden;display:flex;background:#e2e8f0">
      <div style="width:${pc}%;background:#16a34a" title="Consolidado ${pc}%"></div>
      <div style="width:${pp}%;background:#d97706" title="En proceso ${pp}%"></div>
      <div style="width:${pi}%;background:#dc2626" title="Incipiente ${pi}%"></div>
    </div>
    <span style="font-size:10px;color:#16a34a;font-weight:700;white-space:nowrap">${pc}% C</span>
    <span style="font-size:10px;color:#d97706;font-weight:700;white-space:nowrap">${pp}% P</span>
    <span style="font-size:10px;color:#dc2626;font-weight:700;white-space:nowrap">${pi}% I</span>
  </div>`;
}
function semaforo(c=0,p=0,i=0){
  const t=c+p+i||1;
  const pc=Math.round(c/t*100);
  let emoji,color;
  if(pc>=60){emoji="🟢";color="#16a34a";}
  else if(pc>=30){emoji="🟡";color="#d97706";}
  else{emoji="🔴";color="#dc2626";}
  return`<span style="font-size:18px">${emoji}</span><span style="font-size:11px;font-weight:700;color:${color};margin-left:4px">${pc}% C</span>`;
}

}

  <div style="padding:24px;max-width:900px;margin:0 auto">

    <!-- Selector grado + corte -->
    <div style="display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;align-items:flex-end">

            <th style="padding:8px 10px;color:#fff;text-align:left">Corte</th>
            <th style="padding:8px 10px;color:#fff;text-align:left">📚 Lengua</th>
            <th style="padding:8px 10px;color:#fff;text-align:left">🔢 Matemática</th>

function formularioCarga(){
  const esc=STATE.escuela;
  const g=STATE.grado;
  const c=STATE.corte;
  const d=getDato(esc.id,g,c);
  const es12=["1°","2°"].includes(g);
  const es123=["1°","2°","3°"].includes(g);
  const metaL=METAS.lengua[g]?.meta||"";
  const metaM=METAS.matematica[g]?.meta||"";

  const inputPct=(area,campo,label,color)=>{
    const val=d[area]?.[campo]||0;
    return`<div style="background:#f8fafc;border-radius:10px;padding:12px">
      <div style="font-size:11px;font-weight:700;color:${color};margin-bottom:6px">${label}</div>
      <div style="display:flex;align-items:center;gap:8px">
        <input type="number" min="0" max="100" value="${val}"
          onchange="updateDato('${area}','${campo}',this.value)"
          style="width:70px;text-align:center;font-weight:700;font-size:16px;color:${color}"/>
        <span style="font-size:14px;color:#94a3b8">%</span>
        <div style="flex:1;height:8px;border-radius:4px;background:#e2e8f0;overflow:hidden">
          <div style="width:${val}%;height:100%;background:${color};border-radius:4px;transition:width .3s"></div>
        </div>
      </div>
    </div>`;
  };

  return`<div style="display:flex;flex-direction:column;gap:16px">

    <!-- LENGUA -->
    <div style="background:#fff;border-radius:16px;padding:20px;box-shadow:0 2px 16px #0001;border-left:4px solid #6366f1">
      <div style="font-weight:700;color:#6366f1;font-size:15px;margin-bottom:6px">📚 Lengua · ${g} · ${c}</div>
      <div style="font-size:12px;color:#64748b;margin-bottom:14px;font-style:italic;line-height:1.5">${metaL}</div>

      ${es12?`
      <!-- Niveles escritura 1° y 2° -->
      <div style="margin-bottom:14px">

                <span style="font-size:12px;color:#94a3b8">%</span>
              </div>
            </div>`;

      <div style="font-size:11px;font-weight:700;color:#6366f1;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px">Logro de la meta</div>

      <div style="margin-top:8px">${barraH(d.lengua?.c||0,d.lengua?.p||0,d.lengua?.i||0)}</div>
    </div>

    <!-- MATEMÁTICA -->
    <div style="background:#fff;border-radius:16px;padding:20px;box-shadow:0 2px 16px #0001;border-left:4px solid #0369a1">
      <div style="font-weight:700;color:#0369a1;font-size:15px;margin-bottom:6px">🔢 Matemática · ${g} · ${c}</div>
      <div style="font-size:12px;color:#64748b;margin-bottom:14px;font-style:italic;line-height:1.5">${metaM}</div>
      <div style="font-size:11px;font-weight:700;color:#0369a1;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px">Logro de la meta</div>

      💾 Guardar datos · ${g} · ${c}

  </div>`;
}

        <table style="width:100%;border-collapse:separate;border-spacing:0;font-size:12px">
          <thead><tr style="background:#1e293b">

              const tieneDatos=(lc+lp+li)>0||(mc+mp+mi)>0;
              return`<tr style="background:${idx%2===0?"#f8fafc":"#fff"};${!tieneDatos?"opacity:.5":""}">

                <td style="padding:10px;text-align:center">${tieneDatos?`<div style="display:flex;align-items:center;justify-content:center;gap:4px">${semaforo(lc,lp,li)}</div>`:`<span style="color:#cbd5e1;font-size:11px">Sin datos</span>`}</td>
                <td style="padding:10px">${tieneDatos?barraH(lc,lp,li):`<span style="color:#cbd5e1;font-size:11px">—</span>`}</td>

              ${NIV_ESCRITURA.map(n=>`<th style="padding:8px 10px;color:#fff;text-align:center">${n}</th>`).join("")}
            </tr></thead>
            <tbody>
              ${ESCUELAS.map((esc,idx)=>{
                const d=getDato(esc.id,g,c);
                const ne=d.niv_escritura||{};

}

// ── ACCIONES ──────────────────────────────────────────
async function selEscuela(id){
  const esc=ESCUELAS.find(e=>e.id===id);
  setState({modo:"escuela",escuela:esc,loading:true,grado:"1°",corte:"Mayo"});
  // Cargar todos los datos de esta escuela
  const keys=[];
  GRADOS.forEach(g=>CORTES.forEach(c=>keys.push(keyData(id,g,c))));
  const entries=await Promise.all(keys.map(k=>dbGet(k).then(d=>[k,d?JSON.parse(d):null])));
  const o={...STATE.allData};
  entries.forEach(([k,d])=>{if(d)o[k]=d;});
  setState({allData:o,loading:false});
}

async function irInspector(){
  setState({modo:"inspector",loading:true});
  const keys=[];
  ESCUELAS.forEach(e=>GRADOS.forEach(g=>CORTES.forEach(c=>keys.push([e.id,g,c,keyData(e.id,g,c)]))));
  const entries=await Promise.all(keys.map(([eid,g,c,k])=>dbGet(k).then(d=>[k,d?JSON.parse(d):null])));
  const o={};
  entries.forEach(([k,d])=>{if(d)o[k]=d;});
  setState({allData:o,loading:false});
}

function irInicio(){setState({modo:"inicio",escuela:null,busq:""});}

function updateDato(area,campo,val){
  const k=keyData(STATE.escuela.id,STATE.grado,STATE.corte);
  const d=getDato(STATE.escuela.id,STATE.grado,STATE.corte);
  if(!d[area])d[area]={c:0,p:0,i:0};
  d[area][campo]=parseInt(val)||0;
  STATE.allData[k]=d;
  render();
}

function updateNivEscritura(niv,val){
  const k=keyData(STATE.escuela.id,STATE.grado,STATE.corte);
  const d=getDato(STATE.escuela.id,STATE.grado,STATE.corte);
  if(!d.niv_escritura)d.niv_escritura={};
  d.niv_escritura[niv]=parseInt(val)||0;
  STATE.allData[k]=d;
}

function updateNivLectura(niv,val){
  const k=keyData(STATE.escuela.id,STATE.grado,STATE.corte);
  const d=getDato(STATE.escuela.id,STATE.grado,STATE.corte);
  if(!d.niv_lectura)d.niv_lectura={};
  d.niv_lectura[niv]=parseInt(val)||0;
  STATE.allData[k]=d;
}

function updateObs(val){
  const k=keyData(STATE.escuela.id,STATE.grado,STATE.corte);
  const d=getDato(STATE.escuela.id,STATE.grado,STATE.corte);
  d.obs=val;
  STATE.allData[k]=d;
}

async function guardarDatos(){
  const k=keyData(STATE.escuela.id,STATE.grado,STATE.corte);
  const d=getDato(STATE.escuela.id,STATE.grado,STATE.corte);
  await dbSet(k,JSON.stringify(d));
  const btn=document.querySelector("button[onclick='guardarDatos()']");
  if(btn){btn.textContent="✅ Guardado!";btn.style.background="#16a34a";setTimeout(()=>{btn.textContent=`💾 Guardar datos · ${STATE.grado} · ${STATE.corte}`;btn.style.background="#ea580c";},2000);}
}

function render(){
  const r=document.getElementById("root");
  if(STATE.modo==="inicio")r.innerHTML=vistaInicio();
  else if(STATE.modo==="escuela")r.innerHTML=vistaEscuela();
  else if(STATE.modo==="inspector")r.innerHTML=vistaInspectora();
}
if(window.firebaseReady){render();}
else{document.addEventListener("firebaseReady",render,{once:true});render();}
</script>
</body>
</html>
