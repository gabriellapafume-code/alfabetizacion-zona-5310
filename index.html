};
const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);
window.dbGet = async (key) => {
  try { const snap = await getDoc(doc(db,"alfa",key)); return snap.exists()?snap.data().value:null; }

};
window.dbSet = async (key,value) => {
  try { await setDoc(doc(db,"alfa",key),{value}); } catch(e){}
};
window.firebaseReady = true;
document.dispatchEvent(new Event("firebaseReady"));

// ── HELPERS ──────────────────────────────────────────
function badge(v){
  if(!v)return`<span style="color:#cbd5e1;font-size:11px">—</span>`;
  const c=v==="Consolidado"?"badge-c":v==="En proceso"?"badge-p":"badge-i";
  return`<span class="badge ${c}">${v}</span>`;
}
function badgeNivel(v){
  if(!v)return`<span style="color:#cbd5e1;font-size:11px">—</span>`;
  const m={"Diferenciada":"#7c3aed","Silábica":"#db2877","Silábica alfabética":"#ea580c","Cuasialfabética":"#d97706","Alfabética":"#16a34a"};
  const col=m[v]||"#475569";
  return`<span style="background:${col}18;color:${col};border:1px solid ${col}44;border-radius:20px;padding:2px 8px;font-size:10px;font-weight:700">${v}</span>`;
}
function semaforo(ests,claves,area){
  let c=0,p=0,i=0,total=0;
  ests.forEach(e=>{claves.forEach(k=>{const v=e.indicadores?.[k];if(v){total++;if(v==="Consolidado")c++;else if(v==="En proceso")p++;else i++;}});});
  if(!total)return`<span style="color:#cbd5e1;font-size:11px">—</span>`;
  const pctC=Math.round(c/total*100),pctP=Math.round(p/total*100),pctI=Math.round(i/total*100);
  let color,emoji,label;
  if(pctC>=50){color="#16a34a";emoji="🟢";label=`${pctC}%`;}
  else if(pctP>=50){color="#d97706";emoji="🟡";label=`${pctP}%`;}
  else{color="#dc2626";emoji="🔴";label=`${pctI}%`;}
  return`<div style="display:flex;align-items:center;gap:4px"><span style="font-size:16px">${emoji}</span><div><span style="font-size:10px;font-weight:700;color:${color}">${label}</span><div style="display:flex;height:5px;width:60px;border-radius:3px;overflow:hidden;margin-top:2px"><div style="width:${pctC}%;background:#16a34a"></div><div style="width:${pctP}%;background:#d97706"></div><div style="width:${pctI}%;background:#dc2626"></div></div></div></div>`;
}
function clavesArea(area,grado){
  const inds=INDS[area]?.[grado]||[];
  return inds.map(ind=>`${area}_${grado}_${ind}`);
}

    return`<div style="margin-bottom:18px">

      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px">
        ${CORTES.map(c=>{const v=e[`escritura_${c}`]||"";return`<div style="background:#f8fafc;border-radius:8px;padding:8px 10px">
          <div style="font-size:11px;color:#7c3aed;margin-bottom:5px;font-weight:700">📅 ${c}</div>
          <select data-key="escritura_${c}" onchange="updateExtra('escritura_${c}',this.value)" style="font-size:11px;font-weight:700;border-radius:8px;padding:4px 6px;border:1.5px solid #7c3aed44;background:#f5f3ff;color:#7c3aed;width:auto">
            <option value="">— nivel —</option>${NIV_ESCRITURA.map(n=>`<option ${v===n?"selected":""}>${n}</option>`).join("")}
          </select></div>`;}).join("")}
      </div>
      <div style="font-weight:700;color:#db2877;font-size:13px;margin-bottom:10px;padding-left:10px;border-left:3px solid #db2877">📖 Nivel de Lectura</div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
        ${CORTES.map(c=>{const v=e[`lectura_${c}`]||"";return`<div style="background:#f8fafc;border-radius:8px;padding:8px 10px">
          <div style="font-size:11px;color:#db2877;margin-bottom:5px;font-weight:700">📅 ${c}</div>
          <select data-key="lectura_${c}" onchange="updateExtra('lectura_${c}',this.value)" style="font-size:11px;font-weight:700;border-radius:8px;padding:4px 6px;border:1.5px solid #db287744;background:#fdf2f8;color:#db2877;width:auto">
            <option value="">— nivel —</option>${NIV_LECTURA_123.map(n=>`<option ${v===n?"selected":""}>${n}</option>`).join("")}
          </select></div>`;}).join("")}
      </div>
    </div>`;
  };

  const bloqueFluidez=()=>{
    if(!es456)return"";
    return`<div style="margin-bottom:18px">
      <div style="font-weight:700;color:#0ea5e9;font-size:13px;margin-bottom:10px;padding-left:10px;border-left:3px solid #0ea5e9">📖 Fluidez Lectora</div>
      ${["Velocidad","Precisión","Prosodia"].map(dim=>`<div style="margin-bottom:10px">
        <div style="font-size:11px;font-weight:700;color:#475569;margin-bottom:6px">${dim}</div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
          ${CORTES.map(c=>{const k=`fluidez_${dim}_${c}`;const v=e[k]||"";return`<div style="background:#f8fafc;border-radius:8px;padding:8px 10px">
            <div style="font-size:11px;color:#0ea5e9;margin-bottom:5px;font-weight:700">📅 ${c}</div>
            <select data-key="${k}" onchange="updateExtra('${k}',this.value)" style="font-size:11px;font-weight:700;border-radius:8px;padding:4px 6px;border:1.5px solid #0ea5e944;background:#f0f9ff;color:#0ea5e9;width:auto">
              <option value="">— logro —</option>${LOGRO.map(l=>`<option ${v===l?"selected":""}>${l}</option>`).join("")}
            </select></div>`;}).join("")}
        </div></div>`).join("")}
    </div>`;
  };

  const bloqueInds=(area,color,emoji,titulo)=>{
    const inds=INDS[area]?.[g]||[];
    if(!inds.length)return"";
    return`<div style="margin-bottom:18px">
      <div style="font-weight:700;color:${color};font-size:13px;margin-bottom:10px;padding-left:10px;border-left:3px solid ${color}">${emoji} ${titulo}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        ${inds.map(ind=>{const k=`${area}_${g}_${ind}`,v=e.indicadores?.[k]||"";

          const fg=v?{Consolidado:"#16a34a","En proceso":"#d97706",Incipiente:"#dc2626"}[v]:"#94a3b8";

            <div style="font-size:11px;color:#475569;margin-bottom:5px;font-weight:600">${ind}</div>
            <select data-ind="${k}" onchange="updateInd('${k}',this.value)" style="background:${bg};color:${fg};border:1.5px solid ${fg}44;border-radius:8px;padding:4px 8px;font-size:11px;font-weight:700;cursor:pointer;font-family:'Source Sans 3',sans-serif;width:auto">
              <option value="">— seleccionar —</option>${LOGRO.map(l=>`<option value="${l}" ${v===l?"selected":""}>${l}</option>`).join("")}
            </select></div>`;}).join("")}
      </div>
    </div>`;
  };

  return`<div class="modal-overlay" onclick="if(event.target===this)cerrarModal()">
    <div class="modal-box">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
        <h3 style="font-family:'Playfair Display',serif;margin:0;font-size:18px;color:#1e293b">${m.mode==="new"?"Nuevo":"Editar"} estudiante · ${STATE.seccion.label}</h3>
        <button onclick="cerrarModal()" style="background:none;border:none;font-size:26px;cursor:pointer;color:#94a3b8">×</button>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px">
        <div><label style="display:block;font-size:10px;font-weight:700;color:#94a3b8;margin-bottom:3px;text-transform:uppercase">Apellido</label>
          <input id="m-apellido" value="${e.apellido}" placeholder="Apellido"/></div>
        <div><label style="display:block;font-size:10px;font-weight:700;color:#94a3b8;margin-bottom:3px;text-transform:uppercase">Nombre</label>
          <input id="m-nombre" value="${e.nombre}" placeholder="Nombre"/></div>
      </div>
      ${bloqueNiveles()}
      ${bloqueFluidez()}
      ${es456?bloqueInds("comprension","#db2877","📖","Comprensión Lectora"):""}
      ${es456?bloqueInds("escritura_avanzada","#6366f1","✍️","Escritura Avanzada"):""}
      ${bloqueInds("intramat","#ea580c","🔢","Situaciones Intramatemáticas")}
      ${bloqueInds("extramat","#92400e","🌍","Situaciones Extramatemáticas")}
      <div style="margin-top:14px">
        <label style="display:block;font-size:10px;font-weight:700;color:#94a3b8;margin-bottom:3px;text-transform:uppercase">Observaciones</label>
        <textarea id="m-obs" rows="2" placeholder="Notas sobre la trayectoria...">${e.observaciones||""}</textarea>
      </div>
      <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:20px">
        <button class="btn-secondary" onclick="cerrarModal()">Cancelar</button>
        <button class="btn-primary" onclick="guardarEstudiante()">Guardar</button>
      </div>
    </div>
  </div>`;
}

    <div style="margin-bottom:8px"><b style="font-size:11px;color:#db2877">📖 NIVEL DE LECTURA</b><br/>${CORTES.map(c=>`<span style="font-size:11px;margin-right:12px"><b>${c}:</b> <span style="color:${cN(e["lectura_"+c])}">${e["lectura_"+c]||"—"}</span></span>`).join("")}</div>`:""}
    ${es456?`<div style="margin-bottom:8px"><b style="font-size:11px;color:#0ea5e9">📖 FLUIDEZ LECTORA</b><br/>${["Velocidad","Precisión","Prosodia"].map(dim=>`<div style="font-size:11px"><b>${dim}:</b> ${CORTES.map(c=>`<span style="margin-right:10px"><b>${c}:</b> <span style="color:${cL(e["fluidez_"+dim+"_"+c])}">${e["fluidez_"+dim+"_"+c]||"—"}</span></span>`).join("")}</div>`).join("")}</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
      <div><b style="font-size:11px;color:#db2877">📖 COMPRENSIÓN</b>${(INDS.comprension[g]||[]).map(ind=>`<div style="font-size:10px;margin-top:3px">${ind.split(":")[0]}: <b style="color:${cL(e.indicadores?.["comprension_"+g+"_"+ind])}">${e.indicadores?.["comprension_"+g+"_"+ind]||"—"}</b></div>`).join("")}</div>
      <div><b style="font-size:11px;color:#6366f1">✍️ ESCRITURA AVANZADA</b>${(INDS.escritura_avanzada[g]||[]).map(ind=>`<div style="font-size:10px;margin-top:3px">${ind}: <b style="color:${cL(e.indicadores?.["escritura_avanzada_"+g+"_"+ind])}">${e.indicadores?.["escritura_avanzada_"+g+"_"+ind]||"—"}</b></div>`).join("")}</div>
    </div>`:""}
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div><b style="font-size:11px;color:#ea580c">🔢 INTRAMAT.</b>${(INDS.intramat[g]||[]).map(ind=>`<div style="font-size:10px;margin-top:3px">${ind}: <b style="color:${cL(e.indicadores?.["intramat_"+g+"_"+ind])}">${e.indicadores?.["intramat_"+g+"_"+ind]||"—"}</b></div>`).join("")}</div>
      <div><b style="font-size:11px;color:#92400e">🌍 EXTRAMAT.</b>${(INDS.extramat[g]||[]).map(ind=>`<div style="font-size:10px;margin-top:3px">${ind}: <b style="color:${cL(e.indicadores?.["extramat_"+g+"_"+ind])}">${e.indicadores?.["extramat_"+g+"_"+ind]||"—"}</b></div>`).join("")}</div>
    </div>
    ${e.observaciones?`<div style="margin-top:8px;font-size:11px;color:#64748b;font-style:italic;border-top:1px solid #fed7aa;padding-top:6px">📝 ${e.observaciones}</div>`:""}
  </div>`).join("")}
  </body></html>`);
  win.document.close();
  setTimeout(()=>win.print(),600);
}

// ── ACCIONES ─────────────────────────────────────────
async function selEscuela(id){
  const esc=ESCUELAS.find(e=>e.id===id);
  setState({escuela:esc,modo:"selSeccion"});
}
async function selSeccion(secId){
  const sec=SECCIONES_LIST.find(s=>s.id===secId.replace(STATE.escuela.id+"_",""));
  const key=`${STATE.escuela.id}_${secId}`;
  setState({seccion:{...sec,id:key},tab:"carga",loading:true,busqEst:"",modo:"seccion"});
  const data=await dbGet(key);
  setState({allData:{...STATE.allData,[key]:data?JSON.parse(data):[]},loading:false});
}
async function irInspector(){
  setState({modo:"inspector",loading:true,inspEsc:null});
  const keys=[];
  ESCUELAS.forEach(e=>GRADOS.forEach(g=>SECCIONES.forEach(s=>keys.push(`${e.id}_${g}${s}`))));
  const entries=await Promise.all(keys.map(k=>dbGet(k).then(d=>[k,d?JSON.parse(d):[]])));
  const o={};entries.forEach(([k,d])=>o[k]=d);
  setState({allData:o,loading:false});
}
function irInicio(){setState({modo:"inicio",escuela:null,seccion:null,busq:""});}
function toggleInspEsc(id){const esc=ESCUELAS.find(e=>e.id===id);setState({inspEsc:STATE.inspEsc?.id===id?null:esc});}
function abrirModal(){setState({modal:{mode:"new",est:null}});}
function editarEst(est){setState({modal:{mode:"edit",est:JSON.parse(JSON.stringify(est))}});}
function cerrarModal(){setState({modal:null});}
function confirmarBorrar(est){setState({del:est});}
function updateInd(key,val){if(STATE.modal)STATE.modal.est.indicadores={...(STATE.modal.est.indicadores||{}),[key]:val};}
function updateExtra(key,val){if(STATE.modal)STATE.modal.est={...STATE.modal.est,[key]:val};}

async function guardarEstudiante(){
  const m=STATE.modal;
  const apellido=document.getElementById("m-apellido")?.value.trim()||"";
  const nombre=document.getElementById("m-nombre")?.value.trim()||"";
  if(!apellido||!nombre){alert("Completá nombre y apellido.");return;}
  const indicadores={...(m.est?.indicadores||{})};
  document.querySelectorAll("[data-ind]").forEach(s=>{if(s.value)indicadores[s.dataset.ind]=s.value;});
  const extras={};
  document.querySelectorAll("[data-key]").forEach(s=>{if(s.value)extras[s.dataset.key]=s.value;});
  const observaciones=document.getElementById("m-obs")?.value.trim()||"";
  const est={...(m.est||{}),...extras,apellido,nombre,grado:STATE.seccion.grado,seccion:STATE.seccion.seccion,observaciones,indicadores,id:m.est?.id||Date.now()};
  const key=STATE.seccion.id,prev=STATE.allData[key]||[];
  const upd=m.mode==="new"?[...prev,est]:prev.map(e=>e.id===est.id?est:e);
  setState({modal:null,allData:{...STATE.allData,[key]:upd}});
  await dbSet(key,JSON.stringify(upd));
}
async function borrarEstudiante(){
  const key=STATE.seccion.id,upd=(STATE.allData[key]||[]).filter(e=>e.id!==STATE.del.id);
  setState({del:null,allData:{...STATE.allData,[key]:upd}});
  await dbSet(key,JSON.stringify(upd));
}

// ── RENDER ────────────────────────────────────────────
function render(){
  const r=document.getElementById("root");
  if(STATE.modo==="inicio")r.innerHTML=vistaInicio();
  else if(STATE.modo==="selSeccion")r.innerHTML=vistaInicio()+modalSelSeccion();
  else if(STATE.modo==="seccion")r.innerHTML=vistaSeccion();
  else if(STATE.modo==="inspector")r.innerHTML=vistaInspectora();
}
if(window.firebaseReady){render();}
else{document.addEventListener("firebaseReady",render,{once:true});render();}
</script>
